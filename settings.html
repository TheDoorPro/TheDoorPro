<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#15181c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Hinge">
<title>Settings — TheDoorPro</title>
<script>try{var t=localStorage.getItem('hinge-theme');if(t)document.documentElement.dataset.theme=t;}catch(e){}</script>
<style>
  :root{--bg:#15181c;--panel:#191d22;--panel-2:#1e2329;--line:#2c333b;--line-soft:#252b32;
    --text:#ece7db;--muted:#8a93a0;--brass:#b88a3e;--brass-hi:#e6c47e;--radius:14px;--pad:18px;--shadow:0 10px 30px rgba(0,0,0,.5)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.45;transition:background .2s,color .2s}
  .wrap{max-width:680px;margin:0 auto;padding:18px var(--pad) 50px}
  .back{display:inline-flex;align-items:center;gap:7px;color:var(--muted);text-decoration:none;font-size:13px;border:1px solid var(--line-soft);padding:7px 12px;border-radius:9px}
  .back:hover{color:var(--text);border-color:var(--line)}
  h1{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:26px;margin:14px 0 18px}
  .card{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line-soft);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .sub{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--brass-hi);font-weight:800;margin:0 0 12px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{appearance:none;border:none;background:transparent;color:var(--muted);padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer}
  .seg button.on{background:linear-gradient(180deg,var(--brass-hi),var(--brass));color:#11141a}
  .lnk{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border:1px solid var(--line-soft);border-radius:11px;text-decoration:none;color:var(--text);margin-bottom:8px;font-weight:600}
  .lnk:last-child{margin-bottom:0}
  .lnk:hover{border-color:var(--line)}
  .lnk .ar{color:var(--brass)}
  .hide{display:none!important}
  header{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;background:linear-gradient(180deg,#1b1f24,#15181c);border-bottom:1px solid var(--line)}
  header .brand{display:flex;align-items:center;gap:9px}
  header .bdot{width:9px;height:9px;border-radius:50%;background:linear-gradient(180deg,var(--brass-hi),var(--brass));box-shadow:0 0 0 3px rgba(230,196,126,.10)}
  header .wm{font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:20px;color:var(--text)}
  .hd-right{display:flex;align-items:center;gap:10px}
  .hback{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);color:var(--text);text-decoration:none;font-size:18px}
  .hback:hover{border-color:var(--brass)}
  .tnav-burger{appearance:none;background:none;border:1px solid var(--line);border-radius:9px;width:38px;height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer}
  .tnav-burger span{display:block;width:18px;height:2px;border-radius:2px;background:var(--brass-hi);transition:.22s}
  .tnav-burger[aria-expanded="true"] span:nth-child(2){opacity:0}
  .tnav-menu{position:fixed;top:60px;right:16px;width:230px;z-index:300;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 40px -22px rgba(0,0,0,.8);padding:8px;opacity:0;visibility:hidden;transform:translateY(-8px);transition:.2s}
  .tnav-menu.open{opacity:1;visibility:visible;transform:translateY(0)}
  .tnav-menu a{display:block;padding:11px 12px;border-radius:9px;color:var(--text);text-decoration:none;font-size:14.5px;font-weight:600}
  .tnav-menu a:hover{background:rgba(230,196,126,.08)}
  .tnav-div{height:1px;background:var(--line-soft);margin:6px 8px}
  .tnav-signout{color:var(--muted)}
  .cardhd{width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;cursor:pointer;padding:0;color:var(--text)}
  .cardhd .chev{color:var(--brass-hi);transition:transform .2s;font-size:14px}
  .cardhd[aria-expanded="true"] .chev{transform:rotate(90deg)}
  .accbody{margin-top:14px}
  .vrow{display:flex;gap:16px;flex-wrap:wrap;font-size:14px}
  .vrow label{display:flex;align-items:center;gap:7px;cursor:pointer}
  textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:10px 11px;font-size:14px;font-family:inherit;min-height:90px;resize:vertical}
  textarea:focus{outline:none;border-color:var(--brass)}
  .sbtn{appearance:none;border:none;border-radius:11px;background:linear-gradient(180deg,var(--brass-hi),var(--brass));color:#11141a;font-weight:800;font-size:14.5px;padding:12px 16px;cursor:pointer;margin-top:10px}
</style>
</head>
<body>
<header>
  <div class="brand" style="cursor:pointer" onclick="location.href='/index.html'"><span class="bdot"></span><span class="wm">The Hinge</span></div>
  <div class="hd-right">
    <a class="hback" href="/index.html" title="Back" onclick="if(history.length>1){history.back();return false}">&#8592;</a>
    <button class="tnav-burger" id="tnavBtn" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </div>
  <nav class="tnav-menu" id="tnavMenu" aria-label="Go to">
    <a href="/profile.html">My Profile</a>
    <a href="/customers.html?new=1">Add New Customer</a>
    <a href="/customers.html">View all customers</a>
    <a href="/scribe.html?quick=1">Quick Estimate</a>
    <a href="/settings.html">Settings</a>
    <div class="tnav-div" role="separator"></div>
    <a href="/cdn-cgi/access/logout" class="tnav-signout">Sign out</a>
  </nav>
</header>
<div class="wrap">
  <h1>Settings</h1>

  <div class="card">
    <div class="sub">Account</div>
    <a class="lnk" href="/profile.html">My profile <span class="ar">&#8594;</span></a>
  </div>

  <div class="card">
    <button class="cardhd" id="appHd" aria-expanded="false"><span class="sub" style="margin:0">Appearance</span><span class="chev">&#9656;</span></button>
    <div class="accbody hide" id="appBody">
      <div class="seg" id="themeSeg">
        <button data-t="dark" class="on">Dark</button>
        <button data-t="light">Light</button>
      </div>
    </div>
  </div>

  <div class="card hide" id="viewCard">
    <div class="sub">Default customer view</div>
    <div class="vrow" id="viewSeg">
      <label><input type="radio" name="dv" value="all" id="dvAll" style="width:auto;margin:0"> View all customers</label>
      <label><input type="radio" name="dv" value="mine" id="dvMine" style="width:auto;margin:0"> View my customers</label>
    </div>
  </div>

  <div class="card hide" id="adminCard">
    <div class="sub">Admin tools</div>
    <a class="lnk" href="/team.html">Team &amp; roles <span class="ar">&#8594;</span></a>
    <a class="lnk" href="/data.html">Data &amp; Analytics <span class="ar">&#8594;</span></a>
  </div>

  <div class="card">
    <button class="cardhd" id="sugHd" aria-expanded="false"><span class="sub" style="margin:0">Suggest an improvement</span><span class="chev">&#9656;</span></button>
    <div class="accbody hide" id="sugBody">
      <p style="font-size:13px;color:var(--muted);margin:0 0 8px">Got an idea to make The Hinge better? Send it straight to the team.</p>
      <textarea id="sugMsg" placeholder="Your suggestion…"></textarea>
      <button class="sbtn" id="sugSend">Send suggestion</button>
    </div>
  </div>

  <div class="card">
    <div class="sub">About</div>
    <a class="lnk" href="#" id="privacy">Privacy &amp; data <span class="ar">&#8594;</span></a>
  </div>
</div>
<div class="toast" id="toast" style="position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#222831;border:1px solid var(--line);color:#ece7db;padding:10px 16px;border-radius:10px;font-size:13.5px;opacity:0;transition:.25s;z-index:50"></div>

<link rel="stylesheet" href="/theme.css">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  var $=function(s){return document.querySelector(s)};
  var $$=function(s){return Array.prototype.slice.call(document.querySelectorAll(s))};
  function toast(m){var t=$('#toast');t.textContent=m;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},1800)}
  var theme=(function(){try{return localStorage.getItem('hinge-theme')||'dark'}catch(e){return 'dark'}})();
  function paintTheme(){$$('#themeSeg button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-t')===theme);});document.documentElement.dataset.theme=theme;}
  $$('#themeSeg button').forEach(function(b){b.addEventListener('click',function(){
    theme=b.getAttribute('data-t');paintTheme();
    try{localStorage.setItem('hinge-theme',theme);}catch(e){}
    fetch('/api/prefs',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({theme:theme})}).then(function(){toast('Saved');}).catch(function(){});
  });});
  $('#privacy').addEventListener('click',function(e){e.preventDefault();toast('Privacy page coming soon');});

  // accordions
  function acc(hdId,bodyId){var h=$('#'+hdId),b=$('#'+bodyId);if(!h)return;h.addEventListener('click',function(){var open=b.classList.toggle('hide')===false;h.setAttribute('aria-expanded',open?'true':'false');});}
  acc('appHd','appBody');acc('sugHd','sugBody');

  // default customer view (admin only)
  var me=null;
  $$('#viewSeg input').forEach(function(r){r.addEventListener('change',function(){
    var v=$('#dvMine').checked?'mine':'all';
    fetch('/api/prefs',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({listView:v})}).then(function(){toast('Saved');}).catch(function(){});
  });});

  // suggestions (EmailJS with mailto fallback)
  var SUG_PUBLIC_KEY="YOUR_EMAILJS_PUBLIC_KEY";
  var SUG_SERVICE="TheDoorPro_Mortise_Alert";
  var SUG_TEMPLATE="TDP_Hinge_Suggestion";
  var SUPER_ADMIN_EMAIL="lucas_kearney@outlook.com";
  try{if(window.emailjs&&SUG_PUBLIC_KEY.indexOf('YOUR_')!==0)emailjs.init(SUG_PUBLIC_KEY);}catch(e){}
  $('#sugSend').addEventListener('click',function(){
    var msg=$('#sugMsg').value.trim();if(!msg){toast('Type a suggestion first');return;}
    var who=(me&&(me.name||me.email))||'A Hinge user';var email=(me&&me.email)||'';
    var when=new Date().toLocaleString();
    var configured=(window.emailjs&&SUG_PUBLIC_KEY.indexOf('YOUR_')!==0);
    if(configured){
      emailjs.send(SUG_SERVICE,SUG_TEMPLATE,{from_name:who,from_email:email,datetime:when,message:msg,to_email:SUPER_ADMIN_EMAIL})
        .then(function(){$('#sugMsg').value='';toast('Suggestion sent — thank you');})
        .catch(function(){fallback();});
    }else{fallback();}
    function fallback(){
      var body=encodeURIComponent("From: "+who+" ("+email+")\nWhen: "+when+"\n\n"+msg);
      window.location.href="mailto:"+SUPER_ADMIN_EMAIL+"?subject="+encodeURIComponent("The Hinge suggestion")+"&body="+body;
      $('#sugMsg').value='';toast('Opening your email to send');
    }
  });

  async function load(){
    try{var r=await fetch('/api/me');me=await r.json();if(me.role==='admin'||me.role==='super'){$('#adminCard').classList.remove('hide');$('#viewCard').classList.remove('hide');}}catch(e){}
    try{var r2=await fetch('/api/prefs');var p=await r2.json();var dv=(p&&p.listView)||'all';if($('#dvAll')){$('#dvAll').checked=(dv!=='mine');$('#dvMine').checked=(dv==='mine');}}catch(e){}
    paintTheme();
  }
  load();
</script>
<script>(function(){var b=document.getElementById('tnavBtn'),m=document.getElementById('tnavMenu');if(!b||!m)return;
function c(){m.classList.remove('open');b.setAttribute('aria-expanded','false');}
b.addEventListener('click',function(e){e.stopPropagation();var o=m.classList.toggle('open');b.setAttribute('aria-expanded',o?'true':'false');});
document.addEventListener('click',function(e){if(!m.contains(e.target)&&!b.contains(e.target))c();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')c();});})();</script>
</body>
</html>
